<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>سگ‌و شرفدار ترین ها به برنامه ایرانی</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Vazirmatn",sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at center,#0b1220,#000);
  overflow:hidden;
  transition:0.4s;
  color:#f9fafb;
}

/* لامپ: تاریک/روشن با فیلتر (روی کل صفحه) */
body.light{
  filter:invert(1) hue-rotate(180deg);
}

/* ستاره‌ها */
canvas{
  position:fixed;
  inset:0;
  z-index:-2;
}

/* متن‌ها و محتوا */
.wrapper{
  text-align:center;
  position:relative;
  z-index:10;
}

/* متن‌ها کمی بالاتر */
.maker{
  font-size:11px;
  color:#cbd5f5;
  margin-bottom:2px;
  margin-top:-10px;
}

.title{
  font-size:22px;
  font-weight:700;
  margin-bottom:6px;
}

.bg-toggle{
  margin-top:4px;
  font-size:11px;
  color:#00e5ff;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.05);
}

/* کانتینر مثلث و لامپ */
.orbit{
  position:relative;
  width:320px;
  height:260px;
  margin:40px auto 0; /* مثلث میاد پایین‌تر */
}

/* لامپ وسط */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:110px;
  height:110px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  font-size:40px;
  background:white;
  color:#333;
  box-shadow:0 0 30px rgba(255,255,255,0.6);
  transition:0.3s;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* آیکن‌ها */
.icon{
  position:absolute;
  width:70px;
  height:70px;
  border-radius:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 0 25px rgba(255,255,255,0.08);
  font-size:30px;
  color:white;
  transition:0.3s;
}

/* مثلث متساوی‌الساقین، کمی پایین‌تر از قبل */
.instagram{
  top:20px;              /* بالا، ولی پایین‌تر از متن‌ها */
  left:calc(50% - 35px);
}

.youtube{
  top:120px;
  left:calc(50% - 150px);
}

.telegram{
  top:120px;
  left:calc(50% + 80px);
}

/* متن پایین، وسط */
.control{
  margin-top:18px;
  font-size:12px;
  color:#cbd5f5;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="wrapper">

  <div class="maker">سازنده این ابر سایت: امیرعلی حیدریان</div>
  <div class="title">سگ‌و شرفدار ترین ها به برنامه ایرانی</div>

  <div class="bg-toggle" id="bgToggle">
    <i class="fa-solid fa-wand-magic-sparkles"></i>
    تغییر پس‌زمینه: نئونی / فضایی واقعی
  </div>

  <div class="orbit">
    <!-- آیکن‌ها -->
    <a class="icon instagram">
      <i class="fab fa-instagram" style="color:#ff2e9f;"></i>
    </a>

    <a class="icon youtube">
      <i class="fab fa-youtube" style="color:#ff0000;"></i>
    </a>

    <a class="icon telegram">
      <i class="fab fa-telegram" style="color:#2aabee;"></i>
    </a>

    <!-- لامپ -->
    <button class="center" id="lamp">
      <i class="fa-solid fa-lightbulb"></i>
    </button>
  </div>

  <div class="control">روی لامپ بزن، تا صفحه تاریک / روشن بشه.</div>

</div>

<script>
// ستاره‌ها
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
let stars=[];
for(let i=0;i<100;i++){
  stars.push({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    speed:Math.random()*1+0.3
  });
}
function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
window.onresize=resize;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,1.5,0,Math.PI*2);
    ctx.fill();
    s.y+=s.speed;
    if(s.y>canvas.height){
      s.y=0;
      s.x=Math.random()*canvas.width;
    }
  }
  requestAnimationFrame(draw);
}
draw();

// لامپ → تاریک/روشن (فقط کلاس light روی body)
document.getElementById("lamp").onclick=()=>{
  document.body.classList.toggle("light");
};

// تغییر پس‌زمینه (نئونی / فضایی واقعی)
document.getElementById("bgToggle").onclick=()=>{
  document.body.classList.toggle("space-bg");
};
</script>

</body>
</html>
