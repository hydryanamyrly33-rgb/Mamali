<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>سایت نئونی امیرعلی</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Vazirmatn",sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at center,#0b1220,#000);
  overflow:hidden;
  transition:0.4s;
  color:#f9fafb;
}

/* حالت روشن */
body.light{
  background:#f1f5f9;
  color:#111;
}

/* ستاره‌ها (ثابت) */
.stars{
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(2px 2px at 10% 20%,#ffffffaa,transparent),
    radial-gradient(1.5px 1.5px at 30% 70%,#ffffff88,transparent),
    radial-gradient(1.8px 1.8px at 70% 40%,#ffffff99,transparent),
    radial-gradient(1.2px 1.2px at 85% 80%,#ffffff66,transparent);
  z-index:-1;
}

/* محتوای اصلی */
.wrapper{
  text-align:center;
  position:relative;
  z-index:10;
}

/* متن‌ها */
.maker{
  font-size:12px;
  color:#cbd5f5;
  margin-bottom:4px;
  margin-top:-20px;
}

.title{
  font-size:22px;
  font-weight:700;
  margin-bottom:6px;
}

.bg-toggle{
  margin-top:4px;
  font-size:12px;
  color:#00e5ff;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.05);
}

/* کانتینر آیکن‌ها */
.orbit{
  position:relative;
  width:320px;
  height:260px;
  margin:40px auto 0;
}

/* لامپ وسط */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:110px;
  height:110px;
  border-radius:50%;
  cursor:pointer;
  font-size:40px;
  background:white;
  color:#333;
  box-shadow:0 0 30px rgba(255,255,255,0.6);
  transition:0.3s;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* آیکن‌ها */
.icon{
  position:absolute;
  width:70px;
  height:70px;
  border-radius:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 0 25px rgba(255,255,255,0.08);
  font-size:30px;
  color:white;
  transition:0.3s;
}

/* جای‌گذاری دقیق و بدون تداخل */
.instagram{
  top:10px;
  left:calc(50% - 35px);
}

.youtube{
  top:120px;
  left:calc(50% - 150px);
}

.telegram{
  top:120px;
  left:calc(50% + 80px);
}

/* متن پایین */
.control{
  margin-top:18px;
  font-size:12px;
  color:#cbd5f5;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="wrapper">

  <div class="maker">سازنده این ابر سایت🌚: امیرعلی حیدریان</div>
  <div class="title">سایت نئونی فضایی</div>

  <div class="bg-toggle" id="bgToggle">
    <i class="fa-solid fa-wand-magic-sparkles"></i>
    تغییر پس‌زمینه: نئونی / روشن
  </div>

  <div class="orbit">

    <a class="icon instagram" href="https://instagram.com" target="_blank">
      <i class="fab fa-instagram" style="color:#ff2e9f;"></i>
    </a>

    <a class="icon youtube" href="https://youtube.com" target="_blank">
      <i class="fab fa-youtube" style="color:#ff0000;"></i>
    </a>

    <a class="icon telegram" href="https://t.me" target="_blank">
      <i class="fab fa-telegram" style="color:#2aabee;"></i>
    </a>

    <button class="center" id="lamp">
      <i class="fa-solid fa-lightbulb"></i>
    </button>
  </div>

  <div class="control">روی لامپ بزن تا صفحه تاریک/روشن شود.</div>

</div>

<script>
// لامپ → تاریک/روشن
document.getElementById("lamp").onclick = () => {
  document.body.classList.toggle("light");
};

// تغییر پس‌زمینه
document.getElementById("bgToggle").onclick = () => {
  document.body.classList.toggle("light");
};
</script>

</body>
</html>
