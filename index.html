<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>سگ‌و شرفدار ترین ها به برنامه ایرانی</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
:root{
  --bg-mode:neon;
  --text-main:#e5e7eb;
  --text-soft:#9ca3af;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Vazirmatn",sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#0f172a,#000);
  overflow:hidden;
  color:var(--text-main);
  transition:background 0.6s ease;
}

/* حالت فضایی واقعی */
body.space-bg{
  background:radial-gradient(circle at center,#000010,#020617 40%,#000);
}

/* ستاره‌ها */
#bg{
  position:fixed;
  inset:0;
  z-index:-2;
}

/* wrapper */
.wrapper{
  text-align:center;
  position:relative;
  z-index:10;
}

/* عنوان */
.title{
  font-size:26px;
  font-weight:700;
  margin-bottom:6px;
}

.maker{
  font-size:11px;
  color:var(--text-soft);
  margin-bottom:4px;
}

/* دکمه تغییر پس‌زمینه */
.bg-toggle{
  margin-top:6px;
  font-size:11px;
  color:#00e5ff;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.05);
}

/* مدار */
.orbit{
  position:relative;
  width:320px;
  height:320px;
  margin:20px auto;
}

.ring{
  position:absolute;
  width:280px;
  height:280px;
  border-radius:50%;
  border:1px dashed rgba(255,255,255,0.25);
  animation:spin 14s linear infinite;
  transform-style:preserve-3d;
}

@keyframes spin{
  from{transform:rotateX(65deg) rotateZ(0deg);}
  to{transform:rotateX(65deg) rotateZ(360deg);}
}

.pause{
  animation-play-state:paused;
}

/* آیکن‌ها */
.icon{
  position:absolute;
  width:70px;
  height:70px;
  border-radius:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 0 25px rgba(255,255,255,0.08);
  font-size:30px;
  color:white;
  transition:0.3s;
}

.icon:hover{
  transform:scale(1.25);
}

/* دکمه وسط */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:100px;
  height:100px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  font-size:28px;
  background:linear-gradient(145deg,#ffffff,#dddddd);
  box-shadow:0 0 30px rgba(255,255,255,0.6);
  transition:0.3s;
}

.center:hover{
  transform:translate(-50%,-50%) scale(1.1);
}

/* کنترل مدار */
.control-box{
  margin-top:10px;
  font-size:12px;
  color:var(--text-soft);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="wrapper">

  <div class="maker">سازنده این ابر سایت: امیرعلی حیدریان</div>
  <div class="title">سگ‌و شرفدار ترین ها به برنامه ایرانی</div>

  <div class="bg-toggle" id="bgToggle">
    <i class="fa-solid fa-wand-magic-sparkles"></i>
    تغییر پس‌زمینه: نئونی / فضایی واقعی
  </div>

  <div class="orbit">
    <div class="ring" id="ring"></div>

    <!-- سه آیکن دقیقا روی مدار -->
    <a class="icon" id="icon1"
       data-app="instagram://user?username=instagram"
       data-web="https://instagram.com/instagram">
      <i class="fab fa-instagram" style="color:#ff2e9f;"></i>
    </a>

    <a class="icon" id="icon2"
       data-app="tg://resolve?domain=telegram"
       data-web="https://t.me/telegram">
      <i class="fab fa-telegram" style="color:#2aabee;"></i>
    </a>

    <a class="icon" id="icon3"
       data-app="vnd.youtube://"
       data-web="https://youtube.com">
      <i class="fab fa-youtube" style="color:#ff0000;"></i>
    </a>

    <button class="center" id="btn">⋯</button>
  </div>

  <div class="control-box">
    روی سیاره وسط بزن تا چرخش مدار رو متوقف/شروع کنی.
  </div>

</div>

<script>
// ===== ستاره‌ها =====
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
let stars=[];
for(let i=0;i<100;i++){
  stars.push({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    speed:Math.random()*1+0.3
  });
}
function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
window.onresize=resize;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  for(let s of stars){
    ctx.beginPath();
    ctx.arc(s.x,s.y,1.5,0,Math.PI*2);
    ctx.fill();
    s.y+=s.speed;
    if(s.y>canvas.height){
      s.y=0;
      s.x=Math.random()*canvas.width;
    }
  }
  requestAnimationFrame(draw);
}
draw();

// ===== قرار دادن ۳ آیکن دقیقاً روی مدار =====
function placeIcons(){
  const radius=140;
  const icons=[icon1,icon2,icon3];
  const step=360/icons.length;

  icons.forEach((icon,i)=>{
    const angle=(step*i - 90) * Math.PI/180;
    const x=160 + radius*Math.cos(angle) - 35;
    const y=160 + radius*Math.sin(angle) - 35;
    icon.style.left=x+"px";
    icon.style.top=y+"px";
  });
}
placeIcons();

// ===== توقف/شروع مدار =====
const ring=document.getElementById("ring");
document.getElementById("btn").onclick=()=>{
  ring.classList.toggle("pause");
};

// ===== باز کردن اپ → اگر نشد سایت =====
function openSmart(app,web){
  const start=Date.now();
  let fallback=false;
  const timer=setTimeout(()=>{
    if(!fallback && web) window.location=web;
  },700);
  window.location=app;
  setTimeout(()=>clearTimeout(timer),1500);
}

document.querySelectorAll(".icon").forEach(ic=>{
  ic.onclick=(e)=>{
    e.preventDefault();
    openSmart(ic.dataset.app,ic.dataset.web);
  };
});

// ===== تغییر پس‌زمینه =====
document.getElementById("bgToggle").onclick=()=>{
  document.body.classList.toggle("space-bg");
};
</script>

</body>
</html>
