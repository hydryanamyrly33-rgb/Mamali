<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>سایت سگ و شرفدار ترین برنامه ها نسبت به برنامه های ایرانی</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Vazirmatn",system-ui,sans-serif;
}

:root{
  --lightX:50%;
  --lightY:50%;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  color:#f9fafb;
  overflow:hidden;
  transition:background 0.6s ease, color 0.4s ease;
}

/* حالت نئونی */
body.neon{
  background:
    radial-gradient(circle at 10% 20%,#1d0535 0,#020617 55%),
    radial-gradient(circle at 80% 80%,#001b3f 0,#020617 55%);
}

/* حالت فضایی */
body.space{
  background:#020617;
}

/* ⭐ ستاره‌ها ⭐ */
.stars{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-1;
  opacity:0;
  transition:opacity 0.6s ease;
}
.stars .layer1,
.stars .layer2,
.stars .layer3{
  position:absolute;
  inset:0;
  background-repeat:repeat;
  background-size:300px 300px;
}
.stars .layer1{
  background-image:
    radial-gradient(1px 1px at 20% 30%, #ffffff55, transparent),
    radial-gradient(1.2px 1.2px at 70% 60%, #ffffff44, transparent),
    radial-gradient(1px 1px at 50% 80%, #ffffff33, transparent);
  animation: starMove1 40s linear infinite;
}
.stars .layer2{
  background-image:
    radial-gradient(1.5px 1.5px at 10% 20%, #ffffffaa, transparent),
    radial-gradient(1.8px 1.8px at 60% 40%, #ffffff88, transparent),
    radial-gradient(1.4px 1.4px at 80% 70%, #ffffff77, transparent);
  animation: starMove2 25s linear infinite;
}
.stars .layer3{
  background-image:
    radial-gradient(2px 2px at 30% 50%, #ffffffdd, transparent),
    radial-gradient(2.2px 2.2px at 70% 30%, #ffffffcc, transparent),
    radial-gradient(2px 2px at 40% 80%, #ffffffbb, transparent);
  animation: starMove3 15s linear infinite;
}
body.space .stars{ opacity:1; }

@keyframes starMove1{ to{transform:translate(-20px,-30px);} }
@keyframes starMove2{ to{transform:translate(-40px,-60px);} }
@keyframes starMove3{ to{transform:translate(-70px,-90px);} }

/* هاله نئونی */
.glow-layer{
  position:fixed;
  inset:-20%;
  background:
    radial-gradient(circle at 0% 0%,rgba(236,72,153,0.25),transparent 55%),
    radial-gradient(circle at 100% 0%,rgba(56,189,248,0.25),transparent 55%),
    radial-gradient(circle at 50% 100%,rgba(129,140,248,0.25),transparent 55%);
  filter:blur(6px);
  opacity:1;
  transition:opacity 0.6s ease;
  z-index:-2;
}
body.space .glow-layer{ opacity:0.4; }

/* نور دنبال‌کننده انگشت */
#mouseGlow{
  position:fixed;
  width:300px;
  height:300px;
  border-radius:50%;
  pointer-events:none;
  background:
    radial-gradient(
      circle,
      rgba(56,189,248,.22),
      transparent 70%
    );
  transform:translate(-50%,-50%);
  z-index:-1;
}

/* محتوای اصلی */
.wrapper{
  text-align:center;
  position:relative;
  z-index:10;
  transform-style:preserve-3d;
  transition:transform .25s ease;
}

.maker{
  font-size:11px;
  color:#cbd5f5;
  margin-bottom:4px;
}

.title{
  font-size:20px;
  font-weight:800;
  margin-bottom:6px;
  background:linear-gradient(120deg,#ec4899,#a855f7,#22d3ee);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.subtitle{
  font-size:12px;
  color:#e5e7eb;
  margin-bottom:8px;
}

/* دکمه تغییر پس‌زمینه */
.bg-toggle{
  margin-top:4px;
  font-size:11px;
  color:#f9fafb;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:4px 12px;
  border-radius:999px;
  border:1px solid rgba(248,250,252,0.35);
  background:rgba(15,23,42,0.7);
  backdrop-filter:blur(10px);
}
.bg-toggle i{ color:#22d3ee; }

/* دکمه‌های کنترل */
.rotate-control{
  margin-top:10px;
  font-size:12px;
  color:#fff;
  cursor:pointer;
  padding:8px 16px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(15,23,42,.8);
  backdrop-filter:blur(10px);
}

/* کانتینر */
.orbit{
  position:relative;
  width:340px;
  height:260px;
  margin:32px auto 0;
  perspective:900px;
}

/* مکعب‌ها (جایگاه + چرخش مثلثی) */
.cube{
  position:absolute;
  width:80px;
  height:80px;
  transform-style:preserve-3d;
  cursor:pointer;

  transition:
    top 3.5s cubic-bezier(.22,.61,.36,1),
    left 3.5s cubic-bezier(.22,.61,.36,1),
    transform .6s ease,
    box-shadow .4s ease;
}

/* افکت شناور سه‌بعدی روی خود دکمه شیشه‌ای */
@keyframes float3d{
  0%{
    transform:
      translateY(0px)
      rotateZ(0deg);
  }
  50%{
    transform:
      translateY(-8px)
      rotateZ(2deg);
  }
  100%{
    transform:
      translateY(0px)
      rotateZ(0deg);
  }
}

/* پایهٔ مربع شیشه‌ای (VisionOS-style) + نور زنده */
.cube-inner{
  position:absolute;
  inset:0;
  border-radius:18px;

  background:
    radial-gradient(
      circle at var(--lightX) var(--lightY),
      rgba(255,255,255,.35),
      transparent 40%
    ),
    linear-gradient(
      145deg,
      rgba(255,255,255,.22),
      rgba(30,64,175,.92)
    );

  border:2px solid rgba(255,255,255,.55);

  box-shadow:
    0 0 40px rgba(59,130,246,.9),
    0 0 70px rgba(129,140,248,.5),
    inset 0 3px 10px rgba(255,255,255,.25),
    inset 0 -12px 18px rgba(15,23,42,.95);

  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  color:white;

  backdrop-filter:blur(16px);

  transition:
    border-radius 0.9s ease,
    box-shadow 0.9s ease,
    background 0.9s ease,
    transform 0.25s ease;

  animation:float3d 5s ease-in-out infinite;
}

/* نور مخصوص هر برنامه */
.instagram .cube-inner{
  box-shadow:
    0 0 35px #ff2e9f,
    0 0 70px #ff2e9f55,
    inset 0 0 15px rgba(255,255,255,.15);
}
.youtube .cube-inner{
  box-shadow:
    0 0 35px #ff0000,
    0 0 70px #ff000055,
    inset 0 0 15px rgba(255,255,255,.15);
}
.telegram .cube-inner{
  box-shadow:
    0 0 35px #2aabee,
    0 0 70px #2aabee55,
    inset 0 0 15px rgba(255,255,255,.15);
}

/* انعکاس شیشه‌ای عمومی */
.cube-inner::before{
  content:"";
  position:absolute;
  inset:6px;
  border-radius:12px;
  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.55),
      rgba(255,255,255,.05)
    );
  pointer-events:none;
}

/* حالت Glass Orb در round-icons */
body.round-icons .cube-inner{
  border-radius:50%;

  background:
    radial-gradient(
      circle at 30% 25%,
      rgba(255,255,255,.65),
      rgba(255,255,255,.15) 30%,
      rgba(30,64,175,.95) 100%
    );

  border:2px solid rgba(255,255,255,.45);

  backdrop-filter:blur(18px);

  box-shadow:
    inset 0 10px 20px rgba(255,255,255,.25),
    inset 0 -15px 25px rgba(0,0,0,.35),
    0 0 35px rgba(59,130,246,.8),
    0 0 80px rgba(56,189,248,.35);
}

/* انعکاس نور بالای دایره‌ها */
body.round-icons .cube-inner::after{
  content:"";
  position:absolute;
  top:10%;
  left:18%;
  width:40%;
  height:18%;
  border-radius:50%;
  background:rgba(255,255,255,.55);
  filter:blur(6px);
}

/* حالت Premium برای دایره‌ها */
body.round-icons .cube{
  transform:scale(1.08);
}

/* افکت فشاری هنگام لمس */
.cube:active .cube-inner{
  transform:scale(.92);
}

/* جایگاه‌ها برای چرخش مثلثی */
.pos-top{
  top:0;
  left:130px;
}
.pos-left{
  top:120px;
  left:40px;
}
.pos-right{
  top:120px;
  left:220px;
}

/* آیکن‌ها */
.cube.instagram i{ color:#ff2e9f; }
.cube.youtube i{ color:#ff0000; }
.cube.telegram i{ color:#2aabee; }

/* لامپ */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotateX(18deg);
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  background:radial-gradient(circle at 30% 0%,#ffffff,#e5e7eb 40%,#0f172a 100%);
  box-shadow:
    0 0 40px rgba(250,250,250,0.9),
    0 0 80px rgba(56,189,248,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  color:#facc15;
  position:relative;
  overflow:hidden;
}

.center::before{
  content:"";
  position:absolute;
  inset:-8px;
  border-radius:50%;
  border:3px solid transparent;
  border-top-color:#22d3ee;
  border-right-color:#a855f7;
  border-left-color:#ec4899;
  opacity:0.9;
  animation:spin 6s linear infinite;
}

.center::after{
  content:"";
  position:absolute;
  width:70%;
  height:70%;
  border-radius:24px;
  border:2px solid rgba(148,163,184,0.7);
  box-shadow:
    0 0 20px rgba(56,189,248,0.8),
    inset 0 0 18px rgba(15,23,42,0.9);
  transform:rotateX(60deg) rotateZ(25deg);
}

.control{
  margin-top:18px;
  font-size:11px;
  color:#cbd5f5;
}

@keyframes spin{ to{transform:rotate(360deg);} }

/* شهاب‌سنگ‌ها */
.meteor{
  position:fixed;
  width:180px;
  height:2px;
  background:linear-gradient(90deg,#fff,transparent);
  transform:rotate(-35deg);
  z-index:-1;
  animation:meteorMove 2s linear forwards;
}

@keyframes meteorMove{
  from{
    top:-100px;
    left:110%;
  }
  to{
    top:110%;
    left:-200px;
  }
}
</style>
</head>

<body class="neon">

<div class="glow-layer"></div>

<!-- نور دنبال‌کننده انگشت -->
<div id="mouseGlow"></div>

<!-- ⭐⭐ ستاره‌های سه‌لایه ⭐⭐ -->
<div class="stars">
  <div class="layer1"></div>
  <div class="layer2"></div>
  <div class="layer3"></div>
</div>

<!-- شهاب‌سنگ‌ها -->
<div id="meteor-container"></div>

<div class="wrapper">

  <div class="maker">سازنده این ابر سایت کوصیشر🌚👇: امیرعلی سیگمابوی</div>

  <div class="title">سایت سگ و شرفدار ترین برنامه ها نسبت به برنامه های ایرانی</div>

  <div class="subtitle">نئونی–فضایی سه‌بعدی • مکعب‌های شیشه‌ای ضخیم • هولوگرافیک</div>

  <div class="bg-toggle" id="bgToggle">
    <i class="fa-solid fa-wand-magic-sparkles"></i>
    تغییر پس‌زمینه: نئونی / فضایی واقعی
  </div>

  <!-- دکمه توقف/شروع -->
  <button class="rotate-control" id="rotateBtn">
    <i class="fa-solid fa-pause"></i>
    توقف چرخش
  </button>

  <!-- دکمه سنسور ژیروسکوپ -->
  <button class="rotate-control" id="gyroBtn">
    <i class="fa-solid fa-mobile-screen"></i>
    سنسور: خاموش
  </button>

  <div class="orbit">

    <a class="cube instagram pos-top" href="https://instagram.com" target="_blank">
      <div class="cube-inner"><i class="fab fa-instagram"></i></div>
    </a>

    <a class="cube youtube pos-left" href="https://youtube.com" target="_blank">
      <div class="cube-inner"><i class="fab fa-youtube"></i></div>
    </a>

    <a class="cube telegram pos-right" href="https://t.me" target="_blank">
      <div class="cube-inner"><i class="fab fa-telegram"></i></div>
    </a>

    <button class="center" id="lamp">
      <i class="fa-solid fa-lightbulb"></i>
    </button>

  </div>

  <div class="control">
    روی لامپ بزن تا آیکون‌ها بین حالت مربع و دایره تغییر کنند.
  </div>

</div>

<script>
/* ذخیره و بازیابی تنظیمات */
const savedSpace = localStorage.getItem("spaceMode");
if(savedSpace === "true"){
  document.body.classList.remove("neon");
  document.body.classList.add("space");
}

if(localStorage.getItem("roundIcons")==="true"){
  document.body.classList.add("round-icons");
}

/* تغییر پس‌زمینه */
const bgToggle = document.getElementById("bgToggle");
bgToggle.onclick = () => {
  document.body.classList.toggle("neon");
  document.body.classList.toggle("space");
  localStorage.setItem(
    "spaceMode",
    document.body.classList.contains("space")
  );
};

/* تبدیل مربع ↔ دایره */
const lamp = document.getElementById("lamp");
lamp.onclick = () => {
  document.body.classList.toggle("round-icons");
  localStorage.setItem(
    "roundIcons",
    document.body.classList.contains("round-icons")
  );
};

/* چرخش مثلثی نرم */
const insta = document.querySelector(".instagram");
const youtube = document.querySelector(".youtube");
const telegram = document.querySelector(".telegram");

const rotateBtn = document.getElementById("rotateBtn");

let running = true;

let positions = ["pos-top","pos-left","pos-right"];

function rotateTriangle(){

  const temp = positions[2];
  positions[2] = positions[1];
  positions[1] = positions[0];
  positions[0] = temp;

  insta.classList.remove("pos-top","pos-left","pos-right");
  youtube.classList.remove("pos-top","pos-left","pos-right");
  telegram.classList.remove("pos-top","pos-left","pos-right");

  insta.classList.add(positions[0]);
  youtube.classList.add(positions[1]);
  telegram.classList.add(positions[2]);
}

let timer = setInterval(rotateTriangle,3500);

rotateBtn.onclick = () => {

  if(running){
    clearInterval(timer);
    rotateBtn.innerHTML = '<i class="fa-solid fa-play"></i> شروع چرخش';
  }else{
    timer = setInterval(rotateTriangle,3500);
    rotateBtn.innerHTML = '<i class="fa-solid fa-pause"></i> توقف چرخش';
  }

  running = !running;
};

/* نور دنبال‌کننده انگشت + نور زنده روی شیشه‌ها */
const mouseGlow = document.getElementById("mouseGlow");

document.addEventListener("touchmove", e => {
  const t = e.touches[0];
  mouseGlow.style.left = t.clientX + "px";
  mouseGlow.style.top = t.clientY + "px";

  document.documentElement.style.setProperty("--lightX", t.clientX + "px");
  document.documentElement.style.setProperty("--lightY", t.clientY + "px");
});

document.addEventListener("mousemove", e => {
  mouseGlow.style.left = e.clientX + "px";
  mouseGlow.style.top = e.clientY + "px";

  document.documentElement.style.setProperty("--lightX", e.clientX + "px");
  document.documentElement.style.setProperty("--lightY", e.clientY + "px");
});

/* شهاب‌سنگ‌ها */
setInterval(()=>{
  const meteor = document.createElement("div");
  meteor.className = "meteor";
  document.body.appendChild(meteor);
  setTimeout(()=>{ meteor.remove(); },2000);
},12000);

/* سنسور ژیروسکوپ با مجوز */
let gyroEnabled = false;
const gyroBtn = document.getElementById("gyroBtn");

async function enableGyro(){

  try{

    if(
      typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function"
    ){

      const permission =
      await DeviceOrientationEvent.requestPermission();

      if(permission !== "granted"){
        return false;
      }

    }

    return true;

  }catch(err){

    console.log(err);
    return false;

  }

}

gyroBtn.onclick = async ()=>{

  if(!gyroEnabled){

    const ok = await enableGyro();

    if(!ok){
      alert("مرورگر اجازه استفاده از سنسور را نداد.");
      return;
    }

    gyroEnabled = true;

    gyroBtn.innerHTML =
    '<i class="fa-solid fa-mobile-screen"></i> سنسور: روشن';

  }else{

    gyroEnabled = false;

    gyroBtn.innerHTML =
    '<i class="fa-solid fa-mobile-screen"></i> سنسور: خاموش';

  }

};

window.addEventListener("deviceorientation",(e)=>{

  if(!gyroEnabled) return;

  const x = e.gamma || 0;
  const y = e.beta || 0;

  document.querySelectorAll(".cube-inner").forEach(cube=>{

    cube.style.transform =
    `translateY(0px)
     rotateY(${x/4}deg)
     rotateX(${-y/10}deg)`;

  });

  document.querySelector(".wrapper").style.transform =
  `rotateY(${x/20}deg)
   rotateX(${-y/30}deg)`;

});
</script>

</body>
</html>
