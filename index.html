<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>سایت سگ و شرفدار ترین برنامه ها نسبت به برنامه های ایرانی</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Vazirmatn",system-ui,sans-serif;
}

:root{
  --lightX:50%;
  --lightY:50%;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  color:#f9fafb;
  overflow:hidden;
  transition:background 0.6s ease, color 0.4s ease;
}

/* حالت نئونی */
body.neon{
  background:
    radial-gradient(circle at 10% 20%,#1d0535 0,#020617 55%),
    radial-gradient(circle at 80% 80%,#001b3f 0,#020617 55%);
}

/* حالت فضایی */
body.space{
  background:#020617;
}

/* ⭐ ستاره‌ها ⭐ */
.stars{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-1;
  opacity:0;
  transition:opacity 0.6s ease;
}
.stars .layer1,
.stars .layer2,
.stars .layer3{
  position:absolute;
  inset:0;
  background-repeat:repeat;
  background-size:300px 300px;
}
.stars .layer1{
  background-image:
    radial-gradient(1px 1px at 20% 30%, #ffffff55, transparent),
    radial-gradient(1.2px 1.2px at 70% 60%, #ffffff44, transparent),
    radial-gradient(1px 1px at 50% 80%, #ffffff33, transparent);
  animation: starMove1 40s linear infinite;
}
.stars .layer2{
  background-image:
    radial-gradient(1.5px 1.5px at 10% 20%, #ffffffaa, transparent),
    radial-gradient(1.8px 1.8px at 60% 40%, #ffffff88, transparent),
    radial-gradient(1.4px 1.4px at 80% 70%, #ffffff77, transparent);
  animation: starMove2 25s linear infinite;
}
.stars .layer3{
  background-image:
    radial-gradient(2px 2px at 30% 50%, #ffffffdd, transparent),
    radial-gradient(2.2px 2.2px at 70% 30%, #ffffffcc, transparent),
    radial-gradient(2px 2px at 40% 80%, #ffffffbb, transparent);
  animation: starMove3 15s linear infinite;
}
body.space .stars{ opacity:1; }

@keyframes starMove1{ to{transform:translate(-20px,-30px);} }
@keyframes starMove2{ to{transform:translate(-40px,-60px);} }
@keyframes starMove3{ to{transform:translate(-70px,-90px);} }

/* هاله نئونی */
.glow-layer{
  position:fixed;
  inset:-20%;
  background:
    radial-gradient(circle at 0% 0%,rgba(236,72,153,0.25),transparent 55%),
    radial-gradient(circle at 100% 0%,rgba(56,189,248,0.25),transparent 55%),
    radial-gradient(circle at 50% 100%,rgba(129,140,248,0.25),transparent 55%);
  filter:blur(6px);
  opacity:1;
  transition:opacity 0.6s ease;
  z-index:-2;
}
body.space .glow-layer{ opacity:0.4; }

/* نور دنبال‌کننده انگشت */
#mouseGlow{
  position:fixed;
  width:300px;
  height:300px;
  border-radius:50%;
  pointer-events:none;
  background:
    radial-gradient(
      circle,
      rgba(56,189,248,.22),
      transparent 70%
    );
  transform:translate(-50%,-50%);
  z-index:-1;
}

/* محتوای اصلی */
.wrapper{
  text-align:center;
  position:relative;
  z-index:10;
  transform-style:preserve-3d;
  transition:transform .25s ease;
}

.maker{
  font-size:11px;
  color:#cbd5f5;
  margin-bottom:4px;
}

.title{
  font-size:20px;
  font-weight:800;
  margin-bottom:6px;
  background:linear-gradient(120deg,#ec4899,#a855f7,#22d3ee);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.subtitle{
  font-size:12px;
  color:#e5e7eb;
  margin-bottom:8px;
}

/* دکمه تغییر پس‌زمینه */
.bg-toggle{
  margin-top:4px;
  font-size:11px;
  color:#f9fafb;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:4px 12px;
  border-radius:999px;
  border:1px solid rgba(248,250,252,0.35);
  background:rgba(15,23,42,0.7);
  backdrop-filter:blur(10px);
}
.bg-toggle i{ color:#22d3ee; }

/* دکمه‌های کنترل */
.rotate-control{
  margin-top:10px;
  font-size:12px;
  color:#fff;
  cursor:pointer;
  padding:8px 16px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(15,23,42,.8);
  backdrop-filter:blur(10px);
}

/* دکمه غیرفعال */
.rotate-control:disabled{
  opacity:.45;
  cursor:not-allowed;
}

/* پنل تنظیمات جلوه‌ها */
.effects-panel{
  opacity:0;
  max-height:0;
  overflow:hidden;
  transition:.4s ease;
  margin-top:12px;
  padding:0 14px;
  border-radius:18px;
  background:rgba(15,23,42,.85);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.15);
}
.effects-panel.show{
  opacity:1;
  max-height:500px;
  padding:14px;
}
.effects-panel label{
  display:flex;
  gap:10px;
  margin:10px 0;
  font-size:13px;
}

/* کانتینر */
.orbit{
  position:relative;
  width:340px;
  height:260px;
  margin:32px auto 0;
  perspective:900px;
}

/* مکعب‌ها */
.cube{
  position:absolute;
  width:80px;
  height:80px;
  transform-style:preserve-3d;
  cursor:pointer;
  transition:
    top 3.5s cubic-bezier(.22,.61,.36,1),
    left 3.5s cubic-bezier(.22,.61,.36,1),
    transform .6s ease,
    box-shadow .4s ease;
}

/* افکت شناور */
@keyframes float3d{
  0%{ transform:translateY(0px) rotateZ(0deg); }
  50%{ transform:translateY(-8px) rotateZ(2deg); }
  100%{ transform:translateY(0px) rotateZ(0deg); }
}

.float-disabled .cube-inner{
  animation:none !important;
}

/* شیشه‌ای + نور زنده */
.cube-inner{
  position:absolute;
  inset:0;
  border-radius:18px;

  background:
    radial-gradient(circle at var(--lightX) var(--lightY),
      rgba(255,255,255,.35),
      transparent 40%
    ),
    linear-gradient(145deg,
      rgba(255,255,255,.22),
      rgba(30,64,175,.92)
    );

  border:2px solid rgba(255,255,255,.55);

  box-shadow:
    0 0 40px rgba(59,130,246,.9),
    0 0 70px rgba(129,140,248,.5),
    inset 0 3px 10px rgba(255,255,255,.25),
    inset 0 -12px 18px rgba(15,23,42,.95);

  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  color:white;

  backdrop-filter:blur(16px);

  transition:border-radius .9s ease, box-shadow .9s ease, background .9s ease, transform .25s ease;

  animation:float3d 5s ease-in-out infinite;
}

/* نور مخصوص هر برنامه */
.instagram .cube-inner{
  box-shadow:
    0 0 35px #ff2e9f,
    0 0 70px #ff2e9f55,
    inset 0 0 15px rgba(255,255,255,.15);
}
.youtube .cube-inner{
  box-shadow:
    0 0 35px #ff0000,
    0 0 70px #ff000055,
    inset 0 0 15px rgba(255,255,255,.15);
}
.telegram .cube-inner{
  box-shadow:
    0 0 35px #2aabee,
    0 0 70px #2aabee55,
    inset 0 0 15px rgba(255,255,255,.15);
}

/* انعکاس شیشه‌ای */
.cube-inner::before{
  content:"";
  position:absolute;
  inset:6px;
  border-radius:12px;
  background:linear-gradient(180deg,
    rgba(255,255,255,.55),
    rgba(255,255,255,.05)
  );
  pointer-events:none;
}

/* حالت دایره‌ای */
body.round-icons .cube-inner{
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 25%,
      rgba(255,255,255,.65),
      rgba(255,255,255,.15) 30%,
      rgba(30,64,175,.95) 100%
    );
  border:2px solid rgba(255,255,255,.45);
  backdrop-filter:blur(18px);
  box-shadow:
    inset 0 10px 20px rgba(255,255,255,.25),
    inset 0 -15px 25px rgba(0,0,0,.35),
    0 0 35px rgba(59,130,246,.8),
    0 0 80px rgba(56,189,248,.35);
}

body.round-icons .cube-inner::after{
  content:"";
  position:absolute;
  top:10%;
  left:18%;
  width:40%;
  height:18%;
  border-radius:50%;
  background:rgba(255,255,255,.55);
  filter:blur(6px);
}

body.round-icons .cube{
  transform:scale(1.08);
}

/* افکت فشاری */
.cube:active .cube-inner{
  transform:scale(.92);
}

/* جایگاه‌ها */
.pos-top{ top:0; left:130px; }
.pos-left{ top:120px; left:40px; }
.pos-right{ top:120px; left:220px; }

/* آیکن‌ها */
.cube.instagram i{ color:#ff2e9f; }
.cube.youtube i{ color:#ff0000; }
.cube.telegram i{ color:#2aabee; }

/* لامپ */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotateX(18deg);
  width:120px;
  height:120px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  background:radial-gradient(circle at 30% 0%,#ffffff,#e5e7eb 40%,#0f172a 100%);
  box-shadow:
    0 0 40px rgba(250,250,250,0.9),
    0 0 80px rgba(56,189,248,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  color:#facc15;
  position:relative;
  overflow:hidden;
}

.center::before{
  content:"";
  position:absolute;
  inset:-8px;
  border-radius:50%;
  border:3px solid transparent;
  border-top-color:#22d3ee;
  border-right-color:#a855f7;
  border-left-color:#ec4899;
  opacity:.9;
  animation:spin 6s linear infinite;
}

.center::after{
  content:"";
  position:absolute;
  width:70%;
  height:70%;
  border-radius:24px;
  border:2px solid rgba(148,163,184,0.7);
  box-shadow:
    0 0 20px rgba(56,189,248,0.8),
    inset 0 0 18px rgba(15,23,42,0.9);
  transform:rotateX(60deg) rotateZ(25deg);
}

@keyframes spin{ to{transform:rotate(360deg);} }

/* شهاب‌سنگ */
.meteor{
  position:fixed;
  width:180px;
  height:2px;
  background:linear-gradient(90deg,white,transparent);
  transform:rotate(-35deg);
  animation:meteorMove 2s linear forwards;
  z-index:-1;
}

@keyframes meteorMove{
  from{ top:-100px; left:110%; }
  to{ top:110%; left:-200px; }
}

/* پیام شیشه‌ای */
#glassMessage{
  position:fixed;
  top:25px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  padding:14px 20px;
  border-radius:18px;
  background:rgba(15,23,42,.85);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.2);
  color:white;
  font-size:13px;
  z-index:99999;
  opacity:0;
  pointer-events:none;
  transition:opacity .4s ease, transform .4s ease;
  box-shadow:
    0 0 25px rgba(56,189,248,.25),
    0 0 50px rgba(129,140,248,.18);
}

#glassMessage.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
</style>
</head>

<body class="neon">

<div class="glow-layer"></div>
<div id="mouseGlow"></div>

<div class="stars">
  <div class="layer1"></div>
  <div class="layer2"></div>
  <div class="layer3"></div>
</div>

<div id="meteorContainer"></div>

<div class="wrapper">

  <div class="maker">🗣️سازنده این ابر سایت کوصیشر🌚👇: امیرعلی سیگمابوی</div>

  <div class="title">سایت سگ و شرفدار ترین برنامه ها نسبت به برنامه های ایرانی</div>

  <div class="subtitle">نئونی–فضایی سه‌بعدی • مکعب‌های شیشه‌ای ضخیم • هولوگرافیک</div>

  <div class="bg-toggle" id="bgToggle">
    <i class="fa-solid fa-wand-magic-sparkles"></i>
    تغییر پس‌زمینه: نئونی / فضایی واقعی
  </div>

  <button class="rotate-control" id="rotateBtn">
    <i class="fa-solid fa-pause"></i>
    توقف چرخش
  </button>

  <button class="rotate-control" id="effectsBtn">
    ⚙️ تنظیمات جلوه‌ها
  </button>

  <div class="effects-panel" id="effectsPanel">

    <label>
      <input type="checkbox" id="toggleMeteor" checked>
      شهاب فضایی
    </label>

    <label>
      <input type="checkbox" id="toggleGlow" checked>
      نور دنبال‌کننده
    </label>

    <label>
      <input type="checkbox" id="toggleFloat" checked>
      شناوری آیکون‌ها
    </label>

    <label>
      <input type="checkbox" id="toggleRotate" checked>
      چرخش آیکون‌ها
    </label>

  </div>

  <div class="orbit">

    <a class="cube instagram pos-top" href="https://instagram.com" target="_blank">
      <div class="
        <div class="cube-inner"><i class="fab fa-instagram"></i></div>
    </a>

    <a class="cube youtube pos-left" href="https://youtube.com" target="_blank">
      <div class="cube-inner"><i class="fab fa-youtube"></i></div>
    </a>

    <a class="cube telegram pos-right" href="https://t.me" target="_blank">
      <div class="cube-inner"><i class="fab fa-telegram"></i></div>
    </a>

    <button class="center" id="lamp">
      <i class="fa-solid fa-lightbulb"></i>
    </button>

  </div>

  <div class="control">
    رو لامپ بزن تا آیکونا بین حالت مربع و دایره تغییر کونه.
  </div>

</div>

<!-- پیام شیشه‌ای -->
<div id="glassMessage"></div>

<script>
/* ذخیره و بازیابی تنظیمات پس‌زمینه و دایره‌ها */
const savedSpace = localStorage.getItem("spaceMode");
if(savedSpace === "true"){
  document.body.classList.remove("neon");
  document.body.classList.add("space");
}

if(localStorage.getItem("roundIcons")==="true"){
  document.body.classList.add("round-icons");
}

/* تغییر پس‌زمینه */
const bgToggle = document.getElementById("bgToggle");
bgToggle.onclick = () => {
  document.body.classList.toggle("neon");
  document.body.classList.toggle("space");
  localStorage.setItem(
    "spaceMode",
    document.body.classList.contains("space")
  );
};

/* تبدیل مربع ↔ دایره */
const lamp = document.getElementById("lamp");
lamp.onclick = () => {
  document.body.classList.toggle("round-icons");
  localStorage.setItem(
    "roundIcons",
    document.body.classList.contains("round-icons")
  );
};

/* چرخش مثلثی نرم */
const insta = document.querySelector(".instagram");
const youtube = document.querySelector(".youtube");
const telegram = document.querySelector(".telegram");

const rotateBtn = document.getElementById("rotateBtn");

let running = true;

let positions = ["pos-top","pos-left","pos-right"];

function rotateTriangle(){

  const temp = positions[2];
  positions[2] = positions[1];
  positions[1] = positions[0];
  positions[0] = temp;

  insta.classList.remove("pos-top","pos-left","pos-right");
  youtube.classList.remove("pos-top","pos-left","pos-right");
  telegram.classList.remove("pos-top","pos-left","pos-right");

  insta.classList.add(positions[0]);
  youtube.classList.add(positions[1]);
  telegram.classList.add(positions[2]);
}

let timer = setInterval(rotateTriangle,3500);

/* پیام شیشه‌ای با جلوگیری از تایمرهای تکراری */
let glassTimeout;

function showGlassMessage(text){
  const msg = document.getElementById("glassMessage");

  clearTimeout(glassTimeout);

  msg.textContent = text;
  msg.classList.add("show");

  glassTimeout = setTimeout(()=>{
    msg.classList.remove("show");
  },4000);
}

/* دکمه شروع/توقف چرخش با بررسی toggleRotate */
rotateBtn.onclick = () => {

  const rotateEnabled = document.getElementById("toggleRotate").checked;

  if(!rotateEnabled){
    showGlassMessage("ابتدا گزینه «چرخش آیکون‌ها» را در تنظیمات جلوه‌ها فعال کنید.");
    return;
  }

  if(running){
    clearInterval(timer);
    rotateBtn.innerHTML = '<i class="fa-solid fa-play"></i> شروع چرخش';
  }else{
    timer = setInterval(rotateTriangle,3500);
    rotateBtn.innerHTML = '<i class="fa-solid fa-pause"></i> توقف چرخش';
  }

  running = !running;
};

/* نور دنبال‌کننده انگشت + نور زنده روی شیشه‌ها */
const mouseGlow = document.getElementById("mouseGlow");
let glowEnabled = true;

document.addEventListener("touchmove", e => {
  if(!glowEnabled) return;
  const t = e.touches[0];
  mouseGlow.style.left = t.clientX + "px";
  mouseGlow.style.top = t.clientY + "px";

  document.documentElement.style.setProperty("--lightX", t.clientX + "px");
  document.documentElement.style.setProperty("--lightY", t.clientY + "px");
});

document.addEventListener("mousemove", e => {
  if(!glowEnabled) return;
  mouseGlow.style.left = e.clientX + "px";
  mouseGlow.style.top = e.clientY + "px";

  document.documentElement.style.setProperty("--lightX", e.clientX + "px");
  document.documentElement.style.setProperty("--lightY", e.clientY + "px");
});

/* شهاب‌سنگ‌ها با موقعیت تصادفی + ذخیره تنظیمات */
let meteorEnabled = true;
const savedMeteor = localStorage.getItem("meteorEnabled");
if(savedMeteor !== null){
  meteorEnabled = savedMeteor === "true";
}

setInterval(()=>{
  if(!meteorEnabled) return;

  const meteor = document.createElement("div");
  meteor.className = "meteor";

  meteor.style.top = Math.random()*30 + "vh";
  meteor.style.left = (80 + Math.random()*30) + "vw";

  document.body.appendChild(meteor);

  setTimeout(()=>{ meteor.remove(); },2000);
},12000);

/* پنل تنظیمات جلوه‌ها */
const effectsBtn = document.getElementById("effectsBtn");
const effectsPanel = document.getElementById("effectsPanel");
effectsBtn.onclick = ()=>{
  effectsPanel.classList.toggle("show");
};

/* کنترل شهاب فضایی از پنل */
const toggleMeteor = document.getElementById("toggleMeteor");
toggleMeteor.checked = meteorEnabled;
toggleMeteor.onchange = function(){
  meteorEnabled = this.checked;
  localStorage.setItem("meteorEnabled", meteorEnabled);
};

/* کنترل نور دنبال‌کننده از پنل */
const toggleGlow = document.getElementById("toggleGlow");
toggleGlow.checked = glowEnabled;
toggleGlow.onchange = function(){
  glowEnabled = this.checked;
  mouseGlow.style.display = glowEnabled ? "block" : "none";
  localStorage.setItem("glowEnabled", glowEnabled);
};

/* بازیابی نور دنبال‌کننده */
const savedGlow = localStorage.getItem("glowEnabled");
if(savedGlow !== null){
  glowEnabled = savedGlow === "true";
  toggleGlow.checked = glowEnabled;
  mouseGlow.style.display = glowEnabled ? "block" : "none";
}

/* کنترل شناوری از پنل */
let floatEnabled = true;
const toggleFloat = document.getElementById("toggleFloat");
toggleFloat.checked = floatEnabled;
toggleFloat.onchange = function(){
  floatEnabled = this.checked;
  document.body.classList.toggle("float-disabled", !floatEnabled);
  localStorage.setItem("floatEnabled", floatEnabled);
};

/* بازیابی شناوری */
const savedFloat = localStorage.getItem("floatEnabled");
if(savedFloat !== null){
  floatEnabled = savedFloat === "true";
  toggleFloat.checked = floatEnabled;
  document.body.classList.toggle("float-disabled", !floatEnabled);
}

/* کنترل چرخش از پنل */
const toggleRotate = document.getElementById("toggleRotate");
toggleRotate.checked = true;
toggleRotate.onchange = function(){

  rotateBtn.disabled = !this.checked;

  if(this.checked){

    if(!running){
      timer = setInterval(rotateTriangle,3500);
      running = true;
      rotateBtn.innerHTML = '<i class="fa-solid fa-pause"></i> توقف چرخش';
    }

  }else{

    clearInterval(timer);
    running = false;
    rotateBtn.innerHTML = '<i class="fa-solid fa-play"></i> شروع چرخش';

  }

  localStorage.setItem("rotateEnabled", this.checked);
};

/* بازیابی چرخش */
const savedRotate = localStorage.getItem("rotateEnabled");
if(savedRotate !== null){
  toggleRotate.checked = savedRotate === "true";
  rotateBtn.disabled = !toggleRotate.checked;
}
</script>

</body>
</html>
